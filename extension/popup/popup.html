<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 24px;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e4e4e7;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      padding: 5px 7px;
      border-radius: 7px;
      letter-spacing: -1px;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text { font-size: 13px; color: #a0a0b8; }
    .tagline { font-size: 12px; color: #6b6b80; text-align: center; line-height: 1.5; }
    .prompts { margin-top: 14px; font-size: 11px; color: #555; }
    .prompts strong { color: #8a8a9a; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">[.o|.o]</div>
    <span class="brand">Amplify</span>
  </div>
  <div class="status">
    <div class="dot"></div>
    <span class="status-text">Active on ChatGPT</span>
  </div>
  <p class="tagline">Write rough prompts. Get expert-level AI responses.</p>
  <div class="prompts">
    <strong>Demo prompts:</strong><br>
    1. "write me a meal plan for losing weight"<br>
    2. "make me a presentation about our q3 sales results for the board meeting"
  </div>
</body>
</html>
